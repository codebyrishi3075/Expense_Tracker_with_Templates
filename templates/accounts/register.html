{% extends 'base.html' %}

{% block title %}Register - Expense Tracker{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-lg p-8">

    <h2 class="text-3xl font-bold text-center text-gray-800 mb-2">Create Account</h2>
    <p class="text-center text-gray-500 mb-8">Start tracking your expenses today</p>

    <!-- Error / Success Message Box -->
    <div id="msg-box" class="hidden mb-4 px-4 py-3 rounded-lg text-sm font-medium"></div>

    <form id="register-form" novalidate>
      {% csrf_token %}

      <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
          <input type="text" name="first_name" placeholder="John"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" required />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
          <input type="text" name="last_name" placeholder="Doe"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" required />
        </div>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
        <input type="email" name="email" placeholder="john@example.com"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" required />
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
        <input type="text" name="phone_number" placeholder="10-digit number"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" required maxlength="10" />
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" placeholder="Min 5 characters"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" required />
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
        <input type="password" name="confirm_password" placeholder="Re-enter password"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" required />
      </div>

      <button type="submit" id="submit-btn"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition duration-200">
        Create Account
      </button>
    </form>

    <p class="text-center text-sm text-gray-600 mt-6">
      Already have an account?
      <a href="{% url 'accounts:loginUser' %}" class="text-indigo-600 font-semibold hover:underline">Login here</a>
    </p>

  </div>
</div>

<script>
  document.getElementById('register-form').addEventListener('submit', async function (e) {
    e.preventDefault();

    const msgBox  = document.getElementById('msg-box');
    const btn     = document.getElementById('submit-btn');
    const formData = new FormData(this);

    btn.disabled    = true;
    btn.textContent = 'Creating account...';
    msgBox.classList.add('hidden');

    try {
      const response = await fetch("{% url 'accounts:registerUser' %}", {
        method: 'POST',
        body: formData,
        headers: { 'X-CSRFToken': formData.get('csrfmiddlewaretoken') }
      });

      const data = await response.json();

      if (data.success) {
        msgBox.className = 'mb-4 px-4 py-3 rounded-lg text-sm font-medium bg-green-100 text-green-700';
        msgBox.textContent = data.message;
        msgBox.classList.remove('hidden');
        setTimeout(() => window.location.href = data.redirect_url, 1500);
      } else {
        msgBox.className = 'mb-4 px-4 py-3 rounded-lg text-sm font-medium bg-red-100 text-red-700';
        msgBox.textContent = data.error || 'Registration failed!';
        msgBox.classList.remove('hidden');
      }
    } catch (err) {
      msgBox.className = 'mb-4 px-4 py-3 rounded-lg text-sm font-medium bg-red-100 text-red-700';
      msgBox.textContent = 'Something went wrong. Please try again.';
      msgBox.classList.remove('hidden');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Create Account';
    }
  });
</script>
{% endblock %}
